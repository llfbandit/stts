name: stts
description: "Speech-to-Text and Text-to-Speech plugin. Offline first."
version: 1.3.2
homepage: https://github.com/llfbandit/stts

topics:
  - speech-to-text
  - speech-recognition
  - text-to-speech
  - tts
  - voice-synthesizer

resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  stts_platform_interface: ^1.2.2
  stts_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.llfbandit.stts
        pluginClass: SttsPlugin
      ios:
        pluginClass: SttsPlugin
      macos:
        pluginClass: SttsPlugin
      web:
        default_package: stts_web
      windows:
        pluginClass: SttsPluginCApi
