name: stts_web
description: Web specific implementation for stts package called by stts_platform_interface.
version: 1.1.0
homepage: https://github.com/llfbandit/stts/tree/main/stts_web

resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  stts_platform_interface: ^1.1.0
  web: ^1.0.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: SttsWeb
        fileName: stts_web.dart
